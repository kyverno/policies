name: disallow-cri-sock-mount
version: 1.0.0
displayName: Disallow CRI Socket Mounts in ValidatingPolicy
description: >-
  Container daemon socket bind mounts allows access to the container engine on the
  node. This access can be used for privilege escalation and to manage containers
  outside of Kubernetes, and hence should not be allowed. This policy validates that
  the sockets used for CRI engines Docker, Containerd, and CRI-O are not used.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/best-practices-vpol/disallow-cri-sock-mount/disallow-cri-sock-mount.yaml
  ```
keywords:
  - kyverno
  - Best Practices
  - ValidatingPolicy
readme: |
  Container daemon socket bind mounts allows access to the container engine on the
  node. This access can be used for privilege escalation and to manage containers
  outside of Kubernetes, and hence should not be allowed. This policy validates that
  the sockets used for CRI engines Docker, Containerd, and CRI-O are not used.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Best Practices"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod"
