name: require-drop-cap-net-raw
version: 1.0.0
displayName: Require Drop CAP_NET_RAW in ValidatingPolicy
description: >-
  Capabilities permit privileged actions without giving full root access. The
  CAP_NET_RAW capability, enabled by default, allows processes in a container to
  forge packets and bind to any interface potentially leading to MitM attacks.
  This policy ensures that all containers explicitly drop the CAP_NET_RAW ability.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/best-practices-vpol/require-drop-cap-net-raw/require-drop-cap-net-raw.yaml
  ```
keywords:
  - kyverno
  - Best Practices
  - ValidatingPolicy
readme: |
  Capabilities permit privileged actions without giving full root access. The
  CAP_NET_RAW capability, enabled by default, allows processes in a container to
  forge packets and bind to any interface potentially leading to MitM attacks.
  This policy ensures that all containers explicitly drop the CAP_NET_RAW ability.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Best Practices"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod"
