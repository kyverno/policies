apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-helm-tiller
  annotations:
    policies.kyverno.io/title: Disallow Helm Tiller
    policies.kyverno.io/category: Sample
    policies.kyverno.io/minversion: "1.15.0"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Tiller, found in Helm v2, has known security challenges. It requires administrative privileges and acts as a shared
      resource accessible to any authenticated user. Tiller can lead to privilege escalation as
      restricted users can impact other users. It is recommended to use Helm v3+ which does not contain
      Tiller for these reasons. This policy validates that there is not an image
      containing the name `tiller`.
spec:
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      resources: ["pods"]
      operations: ["CREATE", "UPDATE"]
  validationActions: ["Audit"]
  validations:
  - expression: "variables.allContainers.all(container, !container.image.lowerAscii().contains('tiller'))"
    messageExpression: >-
      size(variables.tillerImages) > 0 ? 
      'Helm Tiller is not allowed. Found tiller images: ' + variables.tillerImages.join(', ') : 
      'Helm Tiller is not allowed'
  variables:
  - name: allContainers
    expression: >-
      object.spec.containers + 
      object.spec.?initContainers.orValue([]) + 
      object.spec.?ephemeralContainers.orValue([])
  - name: tillerImages
    expression: >-
      variables.allContainers
      .filter(container, container.image.lowerAscii().contains('tiller'))
      .map(container, container.image)