name: disallow-default-namespace
version: 1.0.0
displayName: Disallow Default Namespace in ValidatingPolicy
description: >-
  Kubernetes Namespaces are an optional feature that provide a way to segment and
  isolate cluster resources across multiple applications and users. As a best
  practice, workloads should be isolated with Namespaces. Namespaces should be required
  and the default namespace should not be used. This policy validates that Pods
  specify a Namespace name other than `default`.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/other-vpol/disallow-default-namespace/disallow-default-namespace.yaml
  ```
keywords:
  - kyverno
  - Best Practices
  - ValidatingPolicy
readme: |
  Kubernetes Namespaces are an optional feature that provide a way to segment and
  isolate cluster resources across multiple applications and users. As a best
  practice, workloads should be isolated with Namespaces. Namespaces should be required
  and the default namespace should not be used. This policy validates that Pods
  specify a Namespace name other than `default`.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Best Practices"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod"
