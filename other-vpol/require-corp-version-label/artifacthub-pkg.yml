name: require-corp-version-label
version: 1.0.0
displayName: Require Corp Version Label in ValidatingPolicy
description: >-
  Validates that pods have a corp.org/version label that matches the semver pattern
  ^v[0-9].[0-9].[0-9]$. This ensures consistent versioning across all deployments.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/other-vpol/require-corp-version-label/require-corp-version-label.yaml
  ```
keywords:
  - kyverno
  - Other
  - ValidatingPolicy
readme: |
  Validates that pods have a corp.org/version label that matches the semver pattern
  ^v[0-9].[0-9].[0-9]$. This ensures consistent versioning across all deployments.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Other"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod, Label"
