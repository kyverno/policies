name: block-bare-pods
version: 1.0.0
displayName: Block Bare Pods in ValidatingPolicy
description: >-
  Prevents creation of bare Pods that are not managed by workload controllers to ensure
  production workloads have self-healing and scaling capabilities. Pods must have
  ownerReferences to be allowed.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/other-vpol/block-bare-pods/block-bare-pods.yaml
  ```
keywords:
  - kyverno
  - Best Practices
  - ValidatingPolicy
readme: |
  Prevents creation of bare Pods that are not managed by workload controllers to ensure
  production workloads have self-healing and scaling capabilities. Pods must have
  ownerReferences to be allowed.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Best Practices"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod"
