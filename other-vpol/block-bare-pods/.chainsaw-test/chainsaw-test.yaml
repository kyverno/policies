# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: block-bare-pods
spec:
  steps:
  - name: step-01
    try:
    - apply:
        file: ../block-bare-pods.yaml
    - assert:
        file: policy-ready.yaml
  - name: step-02
    try:
    - apply:
        expect:
        - check:
            ($error != null): true
        file: bare-pod.yaml
    - apply:
        file: owned-pod.yaml
