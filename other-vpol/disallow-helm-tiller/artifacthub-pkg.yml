name: disallow-helm-tiller
version: 1.0.0
displayName: Disallow Helm Tiller in ValidatingPolicy
description: >-
  Tiller, used in Helm 2, is a highly privileged component that can lead to security
  breaches as it was installed with cluster-admin privileges. With Helm 3, Tiller
  was removed. This policy prevents Pods from running images that contain Tiller.
install: |-
  ```shell
  kubectl apply -f https://raw.githubusercontent.com/kyverno/policies/main/other-vpol/disallow-helm-tiller/disallow-helm-tiller.yaml
  ```
keywords:
  - kyverno
  - Best Practices
  - ValidatingPolicy
readme: |
  Tiller, used in Helm 2, is a highly privileged component that can lead to security
  breaches as it was installed with cluster-admin privileges. With Helm 3, Tiller
  was removed. This policy prevents Pods from running images that contain Tiller.

  Refer to the documentation for more details on Kyverno annotations: https://artifacthub.io/docs/topics/annotations/kyverno/
annotations:
  kyverno/category: "Best Practices"
  kyverno/kubernetesVersion: "1.30"
  kyverno/subject: "Pod"
