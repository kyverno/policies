apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: add-certificates-volume
  annotations:
    policies.kyverno.io/title: Add Certificates as a Volume
    policies.kyverno.io/category: Sample
    policies.kyverno.io/subject: Pod,Volume
    policies.kyverno.io/description: >-
      In some cases you would need to trust custom CA certificates for all the containers of a Pod.
      It makes sense to be in a ConfigMap so that you can automount them by only setting an annotation.
      This policy adds a volume to all containers in a Pod containing the certificate if the annotation
      called `inject-certs` with value `enabled` is found.
spec:
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["deployments", "daemonsets", "statefulsets"]
    - apiGroups: ["batch"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["jobs"]

  mutations:
  # ===== PODS =====
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        has(object.spec) && !has(object.spec.template) &&
        has(object.metadata.annotations) && 
        object.metadata.annotations['inject-certs'] == 'enabled' ?
        object.spec.containers.map(container,
          JSONPatch{
            op: "replace",
            path: "/spec/containers/" + string(object.spec.containers.indexOf(container)) + "/volumeMounts",
            value: dyn((has(container.volumeMounts) ? container.volumeMounts : []) + 
              [dyn({"name": dyn("etc-ssl-certs"), "mountPath": dyn("/etc/ssl/certs")})])
          }
        ) + [
          JSONPatch{
            op: "replace",
            path: "/spec/volumes",
            value: dyn((has(object.spec.volumes) ? object.spec.volumes : []) + 
              [dyn({"name": dyn("etc-ssl-certs"), "configMap": dyn({"name": dyn("ca-pemstore")})})])
          }
        ] : []

  # ===== DEPLOYMENTS, DAEMONSETS, STATEFULSETS, JOBS =====
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        has(object.spec.template) &&
        has(object.spec.template.metadata.annotations) && 
        object.spec.template.metadata.annotations['inject-certs'] == 'enabled' ?
        object.spec.template.spec.containers.map(container,
          JSONPatch{
            op: "replace",
            path: "/spec/template/spec/containers/" + string(object.spec.template.spec.containers.indexOf(container)) + "/volumeMounts",
            value: dyn((has(container.volumeMounts) ? container.volumeMounts : []) + 
              [dyn({"name": dyn("etc-ssl-certs"), "mountPath": dyn("/etc/ssl/certs")})])
          }
        ) + [
          JSONPatch{
            op: "replace",
            path: "/spec/template/spec/volumes",
            value: dyn((has(object.spec.template.spec.volumes) ? object.spec.template.spec.volumes : []) + 
              [dyn({"name": dyn("etc-ssl-certs"), "configMap": dyn({"name": dyn("ca-pemstore")})})])
          }
        ] : []