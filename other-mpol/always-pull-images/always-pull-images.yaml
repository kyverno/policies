apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: always-pull-images
  annotations:
    policies.kyverno.io/title: Always Pull Images
    policies.kyverno.io/category: Sample
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.15.0
    policies.kyverno.io/description: >-
      By default, images that have already been pulled can be accessed by other
      Pods without re-pulling them if the name and tag are known. In multi-tenant scenarios,
      this may be undesirable. This policy mutates all incoming Pods to set their
      imagePullPolicy to Always. An alternative to the Kubernetes admission controller
      AlwaysPullImages.
spec:
  autogen:
    podControllers:
      controllers:
        - deployments
        - daemonsets
        - statefulsets
        - jobs
        - cronjobs
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  matchConditions:
  - name: "all-containers-have-names"
    expression: |
      (object.kind == 'Pod' && 
       object.spec.containers.all(c, has(c.name) && c.name != '' && c.name.size() > 0)) ||
      (object.kind == 'CronJob' && has(object.spec.jobTemplate.spec.template.spec.containers) &&
       object.spec.jobTemplate.spec.template.spec.containers.all(c, has(c.name) && c.name != '' && c.name.size() > 0)) ||
      ((object.kind == 'Deployment' || object.kind == 'DaemonSet' || object.kind == 'StatefulSet' || object.kind == 'Job') &&
       has(object.spec.template.spec.containers) &&
       object.spec.template.spec.containers.all(c, has(c.name) && c.name != '' && c.name.size() > 0))
  mutations:
  - patchType: ApplyConfiguration
    applyConfiguration:
      expression: |
        Object{
          spec: Object.spec{
            containers: object.spec.containers.map(container, 
              Object.spec.containers{
                name: container.name,
                imagePullPolicy: "Always"
              }
            )
          }
        }
